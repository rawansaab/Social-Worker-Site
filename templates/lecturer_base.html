<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>{% block title %}פאנל מרצים{% endblock %} - מערכת שיבוץ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=50">

  {% block head %}{% endblock %}
</head>

<body class="lecturer-area">

<header class="lecturer-header">
  <a href="{{ url_for('dashboard') }}" class="lecturer-logo">
    <img src="{{ url_for('static', filename='images/images.png') }}" alt="לוגו מכללת צפת" class="logo-image">
    <div>
      <div class="logo-title">מערכת שיבוץ</div>
      <div class="logo-sub">אזור מרצים</div>
    </div>
  </a>

  <nav class="lecturer-nav">
    <a href="{{ url_for('dashboard') }}">פאנל מרצים</a>
    <a href="{{ url_for('analytics') }}">ניתוחים סטטיסטיים</a>
    <a href="{{ url_for('placement_system') }}" target="_blank">מערכת השיבוץ</a>
    <a href="{{ url_for('logout') }}" class="btn-outline">יציאה</a>
  </nav>
</header>

<main class="lecturer-content">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrap inner-flash">
        {% for cat, msg in messages %}
          <div class="flash {{ cat }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

</body>
</html>
